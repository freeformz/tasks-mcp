name: Vulnerability Check

on:
  schedule:
    - cron: "0 9 * * 1" # Monday 9am UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  vulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        id: vulncheck
        run: |
          if govulncheck ./... 2>&1 | tee vulncheck-output.txt; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue if vulnerabilities found
        if: steps.vulncheck.outputs.found == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          # Close any existing open vulncheck issues to avoid duplicates
          gh issue list --label vulncheck --state open --json number --jq '.[].number' | while read -r num; do
            gh issue close "$num" --comment "Superseded by new vulncheck run."
          done

          # Ensure the label exists
          gh label create vulncheck --description "govulncheck vulnerability report" --color D93F0B 2>/dev/null || true

          {
            echo "## govulncheck report"
            echo ""
            echo '```'
            cat vulncheck-output.txt
            echo '```'
            echo ""
            echo "**Workflow run:** ${RUN_URL}"
          } > issue-body.md

          gh issue create \
            --title "Security: govulncheck found vulnerabilities ($(date +%Y-%m-%d))" \
            --body-file issue-body.md \
            --label vulncheck
