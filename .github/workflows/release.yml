name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build MCPB bundles
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          # Extract binary paths from GoReleaser artifacts
          # Format: array of objects with fields: name, path, goos, goarch, type, extra
          BINARIES=$(jq -c '.[] | select(.type == "Binary")' dist/artifacts.json)

          echo "$BINARIES" | while read -r artifact; do
            BINARY_PATH=$(echo "$artifact" | jq -r '.path')
            GOOS=$(echo "$artifact" | jq -r '.goos')
            GOARCH=$(echo "$artifact" | jq -r '.goarch')

            # Map Go OS to MCPB platform name
            case "$GOOS" in
              darwin)  MCPB_PLATFORM="darwin" ;;
              linux)   MCPB_PLATFORM="linux" ;;
              windows) MCPB_PLATFORM="win32" ;;
              *)       echo "Unknown OS: ${GOOS}, skipping"; continue ;;
            esac

            BUNDLE_DIR=$(mktemp -d)
            mkdir -p "${BUNDLE_DIR}/server"

            # Copy binary
            BINARY_NAME="tasks-mcp"
            if [ "$GOOS" = "windows" ]; then
              BINARY_NAME="tasks-mcp.exe"
            fi
            cp "$BINARY_PATH" "${BUNDLE_DIR}/server/${BINARY_NAME}"
            chmod +x "${BUNDLE_DIR}/server/${BINARY_NAME}"

            # Generate platform-specific manifest
            jq --arg version "$VERSION" \
               --arg platform "$MCPB_PLATFORM" \
               '.version = $version | .compatibility.platforms = [$platform]' \
               manifest.json > "${BUNDLE_DIR}/manifest.json"

            # Create .mcpb (ZIP) bundle
            MCPB_NAME="tasks-mcp_${VERSION}_${GOOS}_${GOARCH}.mcpb"
            (cd "$BUNDLE_DIR" && zip -r "${GITHUB_WORKSPACE}/${MCPB_NAME}" .)

            rm -rf "$BUNDLE_DIR"
            echo "Created ${MCPB_NAME}"
          done

      - name: Upload MCPB bundles to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for mcpb in tasks-mcp_${VERSION}_*.mcpb; do
            [ -f "$mcpb" ] || continue
            gh release upload "$GITHUB_REF_NAME" "$mcpb" --clobber
            echo "Uploaded $mcpb"
          done

  docker:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: VERSION=${{ github.ref_name }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ github.repository }}@sha256:%s ' *)
